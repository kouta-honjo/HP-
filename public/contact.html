<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - 【研究室名】</title>
  <meta name="description" content="【研究室名】へのアクセス・お問い合わせ情報">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="section">
    <div class="section-inner">
      <h2 class="section-title">Contact <span class="section-title-en">お問い合わせ</span></h2>

      <div class="contact-info">
        <h3 style="font-size:1.1rem; color:var(--navy); margin-bottom:16px; padding-left:12px; border-left:4px solid var(--navy);">連絡先</h3>
        <dl>
          <dt>所属</dt>
          <dd>【大学名】 【研究科名】 【プログラム名】</dd>

          <dt>住所</dt>
          <dd>【郵便番号】 【住所】</dd>

          <dt>Address</dt>
          <dd>【英語住所】</dd>

          <dt>TEL</dt>
          <dd>0XX-XXX-XXXX</dd>

          <dt>FAX</dt>
          <dd>0XX-XXX-XXXX</dd>

          <dt>E-mail</dt>
          <dd>example [at] university.ac.jp</dd>
        </dl>
      </div>

      <div class="about-section">
        <h3>アクセス</h3>
        <p>
          【大学名】 【キャンパス名】<br>
          【最寄り駅からのアクセス方法】
        </p>
        <!-- Google Maps: Replace src with your location's embed URL -->
        <iframe
          class="contact-map"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3000!2d135.0!3d35.0!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2z!5e0!3m2!1sja!2sjp!4v1"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="キャンパスマップ">
        </iframe>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/app.js"></script>
</body>
</html>
