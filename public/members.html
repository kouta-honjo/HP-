<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members - 【研究室名】</title>
  <meta name="description" content="【研究室名】のメンバー紹介">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="section">
    <div class="section-inner">
      <h2 class="section-title">Members <span class="section-title-en">メンバー</span></h2>

      <div class="group-photos">
        <div class="group-photo-item">
          <h3 class="group-photo-year">20XX年度</h3>
          <img src="img/group-photo.jpg" alt="研究室集合写真" class="group-photo-img">
        </div>
      </div>

      <div id="members-content">
        <!-- Faculty -->
        <div class="members-group">
          <h3>Faculty / 教員</h3>
          <ul class="members-simple-list">
            <li class="members-list-item">
              <span class="member-list-role">教授</span>
              <span class="member-list-name">【教員名】</span>
              <span class="member-list-name-en">Name in English</span>
              <a class="member-list-researchmap" href="#" target="_blank" rel="noopener">researchmap</a>
            </li>
          </ul>
        </div>

        <!-- Students -->
        <div class="members-group">
          <h3>Students / 学生</h3>
          <ul class="members-simple-list">
            <li class="members-list-item">
              <span class="member-list-role">修士課程</span>
              <span class="member-list-name">【学生名1】</span>
              <span class="member-list-name-en">Name in English</span>
            </li>
            <li class="members-list-item">
              <span class="member-list-role">修士課程</span>
              <span class="member-list-name">【学生名2】</span>
              <span class="member-list-name-en">Name in English</span>
            </li>
            <li class="members-list-item">
              <span class="member-list-role">学部生</span>
              <span class="member-list-name">【学生名3】</span>
              <span class="member-list-name-en">Name in English</span>
            </li>
          </ul>
        </div>

        <!-- Alumni -->
        <div class="members-group">
          <h3>Alumni / 卒業生</h3>
          <ul class="members-simple-list">
            <li class="members-list-item">
              <span class="member-list-role">修了</span>
              <span class="member-list-name">【卒業生名】</span>
              <span class="member-list-name-en">Name in English</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <section class="cta-banner">
    <div class="cta-banner-inner">
      <h2>メンバー募集中</h2>
      <p>研究室への配属を希望する学生は、お気軽にお問い合わせください。</p>
      <a href="contact.html" class="cta-btn">お問い合わせ →</a>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/app.js"></script>
</body>
</html>
