<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications - 【研究室名】</title>
  <meta name="description" content="【研究室名】の業績一覧">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="section">
    <div class="section-inner">
      <h2 class="section-title">Publications <span class="section-title-en">業績一覧</span></h2>

      <div class="pub-tabs" id="pub-tabs">
        <button class="pub-tab active" data-category="paper">Papers</button>
        <button class="pub-tab" data-category="book">Books</button>
        <button class="pub-tab" data-category="patent">Patents</button>
        <button class="pub-tab" data-category="presentation">Presentations</button>
      </div>

      <div id="pub-content">
        <!-- Papers -->
        <div class="pub-year-group">
          <div class="pub-year">2026</div>
          <ul class="pub-list">
            <li class="pub-item">
              <span class="authors">Author A, Author B, Author C.</span>
              <span class="title">"Sample Paper Title"</span>
              <span class="journal">Journal Name, Vol. X, pp. 1-10</span>
              <span class="doi"> [<a href="#" target="_blank" rel="noopener">DOI</a>]</span>
            </li>
          </ul>
        </div>
        <div class="pub-year-group">
          <div class="pub-year">2025</div>
          <ul class="pub-list">
            <li class="pub-item">
              <span class="authors">Author D, Author E.</span>
              <span class="title">"Another Sample Paper"</span>
              <span class="journal">Another Journal, Vol. Y, pp. 20-30</span>
              <span class="doi"> [<a href="#" target="_blank" rel="noopener">DOI</a>]</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/app.js"></script>
</body>
</html>
